name: .NET Core MVC CI

# Define qué eventos disparan el flujo de trabajo
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    # Corre sobre la última versión estable de Ubuntu
    runs-on: ubuntu-latest

    steps:
    # 1. Descarga el código del repositorio en la máquina virtual
    - name: Checkout del código
      uses: actions/checkout@v4

    # 2. Configura el entorno de .NET SDK
    - name: Configurar .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0' # O cambia a '9.0', '6.0' según la versión de tu proyecto

    # 3. Restaura las dependencias y paquetes NuGet
    - name: Restaurar paquetes NuGet
      run: dotnet restore

    # 4. Compila el proyecto en modo Release sin volver a restaurar
    - name: Compilar proyecto
      run: dotnet build --configuration Release --no-restore

    # 5. Ejecuta las pruebas unitarias (si tu proyecto tiene un proyecto de Test)
    - name: Ejecutar Pruebas
      run: dotnet test --no-build --verbosity normal