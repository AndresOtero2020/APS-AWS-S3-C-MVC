name: Compilacion en la Nube de GitHub

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    # Aquí hacemos la magia: le pedimos a GitHub una máquina virtual de ellos
    runs-on: windows-latest

    steps:
    # 1. Descargar el código fuente en la máquina de GitHub
    - name: Descargando codigo fuente
      uses: actions/checkout@v4

    # 2. Instalar el entorno de .NET en la máquina virtual de GitHub
    - name: Configurar entorno .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' # Ajusta a la versión de tu proyecto (6.0, 7.0, 8.0, etc.)

    # 3. Restaurar paquetes NuGet en la nube
    - name: Restaurando paquetes NuGet
      run: dotnet restore APS-AWS-S3-C/APS-AWS-S3-C.csproj

    # 4. Compilar el proyecto en los servidores de GitHub
    - name: Compilando Proyecto MVC
      run: dotnet build APS-AWS-S3-C/APS-AWS-S3-C.csproj --configuration Release

