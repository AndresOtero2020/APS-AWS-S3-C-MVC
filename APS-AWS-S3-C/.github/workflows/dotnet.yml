name: .NET Core MVC CI (Self-Hosted)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    # 🔴 AQUÍ ESTÁ EL TRUCO: Forzamos a usar tu máquina "ANDR3S_OTERO"
    runs-on: self-hosted

    steps:
    # 1. Descargar el código en tu PC
    - name: Checkout del código
      uses: actions/checkout@v4

    # 2. Restaurar dependencias de .NET
    - name: Restaurar paquetes NuGet
      run: dotnet restore

    # 3. Compilar el proyecto en modo Release
    - name: Compilar proyecto
      run: dotnet build --configuration Release --no-restore